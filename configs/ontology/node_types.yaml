node_types:
  firm:
    description: "Company or business entity."
    required_fields: [canonical_id, name, country, industry]
    temporal: true
  legal_entity:
    description: "Registered legal entity with public identifier such as LEI or CIK."
    required_fields: [canonical_id, name, country]
    temporal: true
  subsidiary:
    description: "Legal subsidiary or controlled affiliate."
    required_fields: [canonical_id, name, parent_id]
    temporal: true
  supplier:
    description: "Supplier role for a firm."
    required_fields: [canonical_id, name]
    temporal: true
  customer:
    description: "Customer role for a firm."
    required_fields: [canonical_id, name]
    temporal: true
  factory:
    description: "Production facility."
    required_fields: [canonical_id, name, country]
    temporal: true
  warehouse:
    description: "Storage and distribution facility."
    required_fields: [canonical_id, name, country]
    temporal: true
  port:
    description: "Seaport or inland cargo port."
    required_fields: [canonical_id, name, country]
    temporal: true
  route:
    description: "Trade, logistics, maritime, rail, or air route."
    required_fields: [canonical_id, name]
    temporal: true
  product:
    description: "Product, component, raw material, HS code, SKU, or BOM item."
    required_fields: [canonical_id, name, product_code]
    temporal: true
  raw_material:
    description: "Primary material or commodity input."
    required_fields: [canonical_id, name]
    temporal: true
  country:
    description: "Country-level geography."
    required_fields: [canonical_id, name, iso2]
    temporal: false
  region:
    description: "Subnational or transnational region."
    required_fields: [canonical_id, name]
    temporal: false
  policy:
    description: "Tariff, sanction, export control, subsidy, or regulation."
    required_fields: [canonical_id, name, policy_type]
    temporal: true
  risk_event:
    description: "Conflict, weather, strike, accident, cyber, or other shock event."
    required_fields: [canonical_id, name, event_type]
    temporal: true
  market_instrument:
    description: "Stock, bond, CDS, commodity, currency, or freight index."
    required_fields: [canonical_id, name, instrument_type]
    temporal: true
  text_artifact:
    description: "News, filing, earnings call, analyst report, or social signal."
    required_fields: [canonical_id, name, source]
    temporal: true
  data_source:
    description: "Public or licensed data source represented as a graph node."
    required_fields: [canonical_id, name, source_id, license]
    temporal: true
  data_category:
    description: "Governance category for data sources, datasets, or evidence domains."
    required_fields: [canonical_id, name, category_type]
    temporal: false
  dataset:
    description: "Dataset, API endpoint, bulk file, or maintained public data product."
    required_fields: [canonical_id, name, source_id]
    temporal: true
  indicator:
    description: "Statistical, macro, market, risk, or logistics indicator used as evidence."
    required_fields: [canonical_id, name, indicator_code]
    temporal: true
  industry:
    description: "Industry or sector taxonomy node used to classify firms and products."
    required_fields: [canonical_id, name]
    temporal: false
  schema_field:
    description: "Named field or column in a source dataset schema."
    required_fields: [canonical_id, name, dataset_id]
    temporal: true
  license_policy:
    description: "License, usage policy, attribution rule, or redistribution constraint."
    required_fields: [canonical_id, name, license_url]
    temporal: true
  coverage_area:
    description: "Geographic, source, or topical coverage segment for a dataset."
    required_fields: [canonical_id, name]
    temporal: false
  source_release:
    description: "Specific source release, bulk file, or API pull represented in the graph."
    required_fields: [canonical_id, name, source_id, checksum]
    temporal: true
  observation_series:
    description: "Time series, event stream, or repeated observations derived from a dataset."
    required_fields: [canonical_id, name, dataset_id]
    temporal: true
