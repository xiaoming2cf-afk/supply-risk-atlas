matrix_version: stage-source-coverage-v0.1
production_status: research_fixture
calibration_status: fixture_proxy_not_calibrated
data_mode: fixture
graph_mode: promoted_public_evidence
warnings:
  - Stage-source coverage is a public-evidence research map, not a production supply-chain database.
  - Live connector paths remain disabled by default; fixtures and promoted summaries are used for tests and startup.
defaults:
  live_fetch_default: disabled
  fixture_required: true
  api_visibility_policy: sanitized_summary_and_lineage_only
  source_payload_policy: no_raw_source_records
source_family_definitions:
  national_policy_macro_public: National, multilateral, policy, macro, trade, sanctions, hazard, and logistics public records used as summarized fixture evidence.
  enterprise_public_disclosure: Public company filings, sanitized disclosure summaries, and reviewed public annual-report uploads used as enterprise evidence.
  industry_public_fixture: Public industry, market, literature, and event-summary sources promoted through fixtures rather than live fetches.
