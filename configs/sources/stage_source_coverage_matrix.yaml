    charts: [PolicyTimeline, PolicyRestrictionImpactChart, ComplianceRestrictionMatrixChart]
    tables: [PolicyEventTable, ConnectorStatusTable, ComplianceRestrictionTable]
    risk_model_usage: Policy restrictions can affect products, equipment, firms, or process capabilities through production-dependency impact edges.
    simulation_usage: Policy-event shocks are modeled as constrained production-dependency impacts, not as rerouting or evasion guidance.
    source_gaps: [Policy scope and effective dates are fixture/proxy summaries until terms-reviewed source refresh is run.]
    proxy_limitations: [Macro and policy records are summarized public fixtures; legal effect, scope, and effective-date interpretation remain source-review limited.]
    priority: P0
    current_coverage_status: implemented
    source_status: fixture_promoted_public_evidence
