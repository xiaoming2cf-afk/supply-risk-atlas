name: ci

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev,api]"
      - run: python -m pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run typecheck:packages
      - run: npm run build:web

  browser-smoke:
    runs-on: ubuntu-latest
    needs:
      - python
      - web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: python -m pip install -e ".[dev,api]"
      - run: npm ci
      - name: Start API dev server
        run: |
          mkdir -p artifacts/runtime
          python -m services.api.dev_server > artifacts/runtime/api-ci.out.log 2> artifacts/runtime/api-ci.err.log &
          echo $! > artifacts/runtime/api-ci.pid
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat artifacts/runtime/api-ci.out.log artifacts/runtime/api-ci.err.log
          exit 1
      - name: Start web dev server in real API mode
        run: |
          NEXT_PUBLIC_SUPPLY_RISK_API_URL=http://127.0.0.1:8000/api/v1 \
            npm --workspace apps/web run dev -- --hostname 127.0.0.1 --port 3000 \
            > artifacts/runtime/web-ci-real.out.log 2> artifacts/runtime/web-ci-real.err.log &
          echo $! > artifacts/runtime/web-ci.pid
          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat artifacts/runtime/web-ci-real.out.log artifacts/runtime/web-ci-real.err.log
          exit 1
      - name: Browser smoke real API mode
        run: |
          SUPPLY_RISK_EXPECT_MODE=real npm run smoke:web
          cp artifacts/browser-smoke/report.json artifacts/browser-smoke/report.real.json
      - name: Restart web dev server in mock mode
        run: |
          kill "$(cat artifacts/runtime/web-ci.pid)" || true
          sleep 2
          npm --workspace apps/web run dev -- --hostname 127.0.0.1 --port 3000 \
            > artifacts/runtime/web-ci-mock.out.log 2> artifacts/runtime/web-ci-mock.err.log &
          echo $! > artifacts/runtime/web-ci.pid
          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat artifacts/runtime/web-ci-mock.out.log artifacts/runtime/web-ci-mock.err.log
          exit 1
      - name: Browser smoke mock mode
        run: |
          SUPPLY_RISK_EXPECT_MODE=mock npm run smoke:web
          cp artifacts/browser-smoke/report.json artifacts/browser-smoke/report.mock.json
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-artifacts
          path: artifacts/
      - name: Stop dev servers
        if: always()
        run: |
          if [ -f artifacts/runtime/web-ci.pid ]; then kill "$(cat artifacts/runtime/web-ci.pid)" || true; fi
          if [ -f artifacts/runtime/api-ci.pid ]; then kill "$(cat artifacts/runtime/api-ci.pid)" || true; fi
