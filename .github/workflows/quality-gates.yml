name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  governance-docs-and-acceptance:
    name: Governance, docs, and acceptance
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report changed-file gate routing
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess

          if os.environ.get("GITHUB_EVENT_NAME") != "pull_request":
              print("Changed-file gate routing is reported for pull requests only.")
              raise SystemExit(0)

          base_ref = os.environ.get("GITHUB_BASE_REF")
          if not base_ref:
              print("No pull request base ref found; skipping changed-file gate routing.")
              raise SystemExit(0)

          subprocess.run(["git", "fetch", "origin", base_ref, "--depth=1"], check=False)
          result = subprocess.run(
              ["git", "diff", "--name-only", f"origin/{base_ref}...HEAD"],
              check=True,
              text=True,
              capture_output=True,
          )
          changed = [Path(line.strip()).as_posix() for line in result.stdout.splitlines() if line.strip()]
          if not changed:
              print("No changed files detected.")
              raise SystemExit(0)

          routes = [
              (("docs/", "AGENTS.md", "README.md", ".github/workflows/"), "Governance and docs; PII/secret hygiene for workflow or deployment changes", "QA and docs supervisor"),
              (("tests/e2e/",), "Governance and docs; E2E acceptance; source freshness for stale or degraded data states", "QA and docs supervisor"),
              (("data_contracts/", "configs/sources/", "source_manifests/", "scripts/sources/", "services/ingest/"), "Real-data source license; schema validation; source freshness; contract compatibility; PII/secret hygiene", "API and contracts with Data and ML"),
              (("configs/features/", "configs/labels/", "ml/"), "Schema validation; source freshness; snapshot determinism; leakage and model quality; contract compatibility", "Data and ML"),
              (("graph_kernel/", "packages/sra_core/", "configs/ontology/"), "Schema validation; snapshot determinism; graph invariants; contract compatibility", "Graph and core model"),
              (("services/api/", "packages/shared-types/", "packages/api-client/"), "Contract compatibility; unit and API behavior; schema validation; source freshness metadata checks", "API and contracts"),
              (("apps/web/", "packages/design-system/"), "Frontend runtime; E2E acceptance for user-visible workflows; source freshness display checks", "Product and frontend"),
              (("infra/", "render.yaml", "docs/deployment/", "configs/environments/"), "Infrastructure; PII/secret hygiene; source license policy for exposed data; Render/GitHub deployment notes", "Infrastructure with QA and docs supervisor"),
          ]

          print("Changed-file gate routing:")
          emitted = set()
          for file_path in changed:
              matches = []
              for prefixes, gates, owner in routes:
                  if any(file_path == prefix.rstrip("/") or file_path.startswith(prefix) for prefix in prefixes):
                      matches.append((gates, owner))
              if not matches:
                  matches.append(("Nearest applicable repository gate by reviewer judgment", "Owning lane for changed path"))
              for gates, owner in matches:
                  row = (file_path, gates, owner)
                  if row in emitted:
                      continue
                  emitted.add(row)
                  print(f"- {file_path}: {gates} | responsible: {owner}")
          PY

      - name: Validate required docs and acceptance coverage
        run: |
          python - <<'PY'
          from pathlib import Path
          from urllib.parse import unquote
          import re
          import sys

          root = Path.cwd()
          required = [
              Path("AGENTS.md"),
              Path("README.md"),
              Path("docs/governance/multi-agent.md"),
              Path("docs/architecture/overview.md"),
              Path("docs/data/data-flow.md"),
              Path("docs/quality-gates.md"),
              Path("docs/governance/real-data-governance.md"),
              Path("docs/deployment/github-ci.md"),
              Path("tests/e2e/README.md"),
              Path("tests/e2e/supply-risk-atlas.feature"),
          ]

          errors = []
          for path in required:
              full_path = root / path
              if not full_path.exists():
                  errors.append(f"Missing required file: {path}")
              elif full_path.is_file() and full_path.stat().st_size == 0:
                  errors.append(f"Required file is empty: {path}")

          scan_roots = [
              root / "AGENTS.md",
              root / "README.md",
              root / "docs",
              root / ".github" / "workflows",
              root / "tests" / "e2e",
          ]
          scan_files = []
          for item in scan_roots:
              if item.is_file():
                  scan_files.append(item)
              elif item.is_dir():
                  scan_files.extend(path for path in item.rglob("*") if path.is_file())

          conflict_re = re.compile(r"^(<{7}|={7}|>{7})", re.MULTILINE)
          for path in scan_files:
              text = path.read_text(encoding="utf-8", errors="replace")
              if conflict_re.search(text):
                  errors.append(f"Conflict marker found: {path.relative_to(root)}")

          quality_text = (root / "docs" / "quality-gates.md").read_text(encoding="utf-8", errors="replace")
          required_real_data_terms = [
              "License policy",
              "Schema validation",
              "Source freshness",
              "Contract compatibility",
              "PII/secret hygiene",
              "Input-manifest determinism",
              "public no-key sources",
              "Changed-File Gate Routing",
          ]
          for term in required_real_data_terms:
              if term not in quality_text:
                  errors.append(f"Missing real-data quality gate term in docs/quality-gates.md: {term}")

          workflow_files = list((root / ".github" / "workflows").glob("*.yml")) + list((root / ".github" / "workflows").glob("*.yaml"))
          broad_artifact_re = re.compile(r"(?mi)^\s*path:\s*[\"']?artifacts/?[\"']?\s*$")
          raw_artifact_re = re.compile(r"(?i)(data/raw|raw-data|raw_data|source-extract|source_extract|\.env)")
          for workflow_file in workflow_files:
              workflow_text = workflow_file.read_text(encoding="utf-8", errors="replace")
              if "actions/upload-artifact" in workflow_text and broad_artifact_re.search(workflow_text):
                  errors.append(f"Broad artifact upload is not allowed: {workflow_file.relative_to(root)}")
              for line_number, line in enumerate(workflow_text.splitlines(), start=1):
                  if "path:" in line and raw_artifact_re.search(line):
                      errors.append(f"Potential raw data or secret artifact path: {workflow_file.relative_to(root)}:{line_number}")

          link_re = re.compile(r"(?<!!)\[[^\]]+\]\(([^)]+)\)")
          markdown_files = [
              root / "AGENTS.md",
              root / "README.md",
              *list((root / "docs").rglob("*.md")),
              *list((root / "tests" / "e2e").rglob("*.md")),
          ]
          for md_file in markdown_files:
              if not md_file.exists():
                  continue
              text = md_file.read_text(encoding="utf-8", errors="replace")
              for match in link_re.finditer(text):
                  target = match.group(1).strip()
                  if not target or target.startswith("#"):
                      continue
                  if re.match(r"^[a-zA-Z][a-zA-Z0-9+.-]*:", target):
                      continue
                  target_path = unquote(target.split("#", 1)[0])
                  if not target_path:
                      continue
                  resolved = (md_file.parent / target_path).resolve()
                  try:
                      resolved.relative_to(root.resolve())
                  except ValueError:
                      errors.append(f"Link escapes repository: {md_file.relative_to(root)} -> {target}")
                      continue
                  if not resolved.exists():
                      errors.append(f"Broken local link: {md_file.relative_to(root)} -> {target}")

          feature_path = root / "tests" / "e2e" / "supply-risk-atlas.feature"
          if feature_path.exists():
              feature_text = feature_path.read_text(encoding="utf-8", errors="replace")
              scenario_count = len(re.findall(r"^\s*Scenario(?: Outline)?:", feature_text, re.MULTILINE))
              if scenario_count < 5:
                  errors.append(f"Expected at least 5 E2E scenarios, found {scenario_count}")
              for tag in ["@smoke", "@risk", "@graph", "@explainability", "@resilience"]:
                  if tag not in feature_text:
                      errors.append(f"Missing required E2E tag: {tag}")

          if errors:
              print("Quality gate failures:")
              for error in errors:
                  print(f"- {error}")
              sys.exit(1)

          print("Governance, documentation, and acceptance gates passed.")
          PY

  optional-code-gates:
    name: Optional implementation gates
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node when needed
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Node checks when package.json exists
        shell: pwsh
        run: |
          if (-not (Test-Path "package.json")) {
            Write-Host "No package.json found; skipping Node checks."
            exit 0
          }

          $packageManager = "npm"
          if (Test-Path "pnpm-lock.yaml") {
            corepack.cmd enable
            $packageManager = "pnpm"
            pnpm.cmd install --frozen-lockfile
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } elseif (Test-Path "yarn.lock") {
            corepack.cmd enable
            $packageManager = "yarn"
            yarn.cmd install --immutable
            if ($LASTEXITCODE -ne 0) {
              yarn.cmd install --frozen-lockfile
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
          } else {
            if (Test-Path "package-lock.json") {
              npm.cmd ci
            } else {
              npm.cmd install
            }
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          function Invoke-ScriptIfPresent {
            param([string] $Name)

            $packageJson = Get-Content "package.json" -Raw | ConvertFrom-Json
            $scripts = @()
            if ($packageJson.scripts) {
              $scripts = $packageJson.scripts.PSObject.Properties.Name
            }

            if ($scripts -notcontains $Name) {
              Write-Host "No $Name script found; skipping."
              return
            }

            if ($packageManager -eq "pnpm") {
              pnpm.cmd run $Name
            } elseif ($packageManager -eq "yarn") {
              yarn.cmd run $Name
            } else {
              npm.cmd run $Name
            }

            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

          Invoke-ScriptIfPresent "lint"
          Invoke-ScriptIfPresent "typecheck"
          Invoke-ScriptIfPresent "test"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python checks when Python files exist
        shell: pwsh
        run: |
          $checkDirs = @("services", "packages", "ml", "graph_kernel", "tests") | Where-Object { Test-Path $_ }
          $pythonFiles = @()
          if ($checkDirs.Count -gt 0) {
            $pythonFiles = @(Get-ChildItem -Path $checkDirs -Recurse -File -Filter "*.py")
          }

          if ($pythonFiles.Count -gt 0) {
            python -m compileall @checkDirs
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "No Python files found; skipping compile check."
          }

          $testFiles = @()
          if (Test-Path "tests") {
            $testFiles = @(Get-ChildItem -Path "tests" -Recurse -File -Include "test_*.py", "*_test.py")
          }

          if ($testFiles.Count -gt 0) {
            python -m pip install --upgrade pip
            if (Test-Path "pyproject.toml") {
              python -m pip install -e ".[dev,api]"
            } else {
              python -m pip install pytest
            }
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            python -m pytest
          } else {
            Write-Host "No pytest-style tests found; skipping pytest."
          }
