services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: supplyrisk
      POSTGRES_USER: supplyrisk
      POSTGRES_PASSWORD: supplyrisk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: supplyrisk
      MINIO_ROOT_PASSWORD: supplyrisk123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  kuzu:
    image: kuzudb/explorer:latest
    ports:
      - "8001:8000"

volumes:
  postgres_data:
  minio_data:
